<svg width="900" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
  </g>
  <!-- Glow circle -->
  <circle cx="450" cy="200" r="220" fill="url(#glow)"/>
  <!-- Border -->
  <rect width="900" height="400" fill="none" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Top-left tag -->
  <rect x="30" y="28" width="120" height="22" rx="11" fill="#00d4ff" fill-opacity="0.15"/>
  <text x="90" y="43" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4ff" letter-spacing="1">TOPIC 1</text>
  <!-- Icon -->
  <text x="450" y="185" text-anchor="middle" font-size="80" font-family="serif">📂</text>
  <!-- Main label -->
  <text x="450" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff">File Transfer Protocol</text>
  <!-- Sublabel -->
  <text x="450" y="294" text-anchor="middle" font-family="monospace" font-size="14" fill="#94a3b8">Internet Terminology Reference</text>
  <!-- Bottom bar -->
  <rect x="0" y="390" width="900" height="10" fill="#00d4ff" fill-opacity="0.25"/>
</svg>